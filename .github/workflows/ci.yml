name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: lint-and-test (Python 3.14.6)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14.6
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run lint and type checks
        run: make lint

      - name: Run complete non-integration test suite
        run: make test

  install-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: core
            extras: ""
            check: |
              python -c "from codex_rosetta import get_converter_for_provider; print('core import OK')"
              python -c "from codex_rosetta.converters.google_genai.content_ops import GoogleGenAIContentOps; print('google converter OK')"
          - name: gateway
            extras: "[gateway]"
            check: |
              python -c "from codex_rosetta.gateway import main; print('gateway import OK')"
              codex-rosetta-gateway --version

    name: smoke-test (${{ matrix.variant.name }}, Python 3.14.6)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14.6
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install from wheel in clean venv
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          WHL=$(ls dist/*.whl)
          /tmp/smoke-venv/bin/pip install "${WHL}${{ matrix.variant.extras }}"

      - name: Smoke test imports
        run: |
          source /tmp/smoke-venv/bin/activate
          ${{ matrix.variant.check }}
