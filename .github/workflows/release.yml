name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.7.0)"
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so back-releases can resolve an
          # existing v<version> tag rather than only the default branch.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve tag and verify version
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v$VERSION"
          read_pkg_ver() {
            python -c "import re; m=re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/llm_rosetta/__init__.py').read()); print(m.group(1))"
          }
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            # Back-release: tag already exists. Verify __init__.py *at the tag*
            # matches, so we publish exactly what was tagged.
            echo "Tag $TAG already exists — back-release mode."
            PKG_VER=$(git show "$TAG:src/llm_rosetta/__init__.py" | python -c "import re,sys; m=re.search(r'__version__\s*=\s*\"(.+?)\"', sys.stdin.read()); print(m.group(1))")
            echo "Package version at $TAG: $PKG_VER"
            [ "$PKG_VER" = "$VERSION" ] || \
              (echo "::error::Version mismatch: $TAG has $PKG_VER but release requested $VERSION"; exit 1)
          else
            # Fresh release: verify the current checkout, then create the tag.
            echo "Tag $TAG does not exist — fresh release mode."
            PKG_VER=$(read_pkg_ver)
            echo "Package version: $PKG_VER"
            [ "$PKG_VER" = "$VERSION" ] || \
              (echo "::error::Version mismatch: __init__.py has $PKG_VER but release requested $VERSION"; exit 1)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

  build-publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7

  docker:
    needs: build-publish
    uses: ./.github/workflows/docker.yml
    with:
      tag: ${{ inputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  github-release:
    needs: build-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ inputs.version }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            # Back-release: release already exists, just (re)upload artifacts.
            echo "Release $TAG already exists — uploading artifacts."
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes
          fi
